name: edu_quiz_app
description: "A G.C.E. O/L Quiz Application for Sri Lankan Students."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management (ප්‍රාන්ත කළමනාකරණය සඳහා)
  provider: ^6.1.1

  # Local SQLite Database (දේශීය දත්ත ගබඩාව සඳහා)
  sqflite: ^2.3.0

  # Path Helpers (දත්ත ගබඩා ගොනු මාර්ගය සඳහා)
  path: ^1.8.3

  # Icons and Design elements (අයිකන සඳහා)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
